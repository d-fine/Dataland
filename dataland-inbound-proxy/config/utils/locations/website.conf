# Astro static website — marketing pages
# These location blocks serve pre-rendered HTML from the Astro build output
# mounted at /var/www/astro. They are included before the SPA catch-all
# (frontend*.conf). Exact-match locations (= /path) always beat the
# prefix-match "location /" in the frontend config, so routing is safe.

location = / {
    root /var/www/astro;
    add_header Content-Security-Policy $default_content_security_policy always;
    # Security headers (same as security.conf)
    add_header Referrer-Policy $default_referrer_policy always;
    add_header Strict-Transport-Security $default_strict_transport_security always;
    add_header X-Content-Type-Options $default_x_content_type_options always;
    add_header X-Frame-Options $default_x_frame_options always;
    # Match old frontend behaviour
    add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
    try_files /index.html =404;
}

location = /about {
    root /var/www/astro;
    try_files /about/index.html =404;
}

location = /community {
    root /var/www/astro;
    try_files /community/index.html =404;
}

location = /community/ {
    root /var/www/astro;
    try_files /community/index.html =404;
}

location = /partner-stories {
    root /var/www/astro;
    try_files /partner-stories/index.html =404;
}

location = /newsletter {
    root /var/www/astro;
    try_files /newsletter/index.html =404;
}

location = /product {
    root /var/www/astro;
    try_files /product/index.html =404;
}

location = /imprint {
    root /var/www/astro;
    try_files /imprint/index.html =404;
}

location = /legal {
    root /var/www/astro;
    try_files /legal/index.html =404;
}

location = /dataprivacy {
    root /var/www/astro;
    try_files /dataprivacy/index.html =404;
}

location = /testimonials {
    root /var/www/astro;
    try_files /testimonials/index.html =404;
    add_header Content-Security-Policy $default_content_security_policy always;
}

location /success-stories/ {
    root /var/www/astro;
    try_files $uri $uri/index.html =404;
}

# Astro hashed assets — long-term immutable cache
location /_astro/ {
    root /var/www/astro;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /scripts/ {
    root /var/www/astro;
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
}

# Static assets: serve from Astro build output if the file exists there (e.g. logos,
# silent-check-sso.html), otherwise fall through to the frontend SPA container
# (e.g. /static/icons/ which is only used inside the Vue app).
location /static/ {
    root /var/www/astro;
    expires 30d;
    add_header Cache-Control "public";

    # Vite dev requests asset modules as /static/...?(import|url|raw|inline);
    # those must be handled by the frontend dev server (JS module response), not by Astro static files.
    if ($query_string ~ "(^|&)(import|url|raw|inline)(=|&|$)") {
        return 418;
    }

    try_files $uri @frontend;
}

error_page 418 = @frontend;

# @frontend is defined in the included frontend*.conf file, with the correct upstream per environment.

# Sitemap files generated by Astro
location = /sitemap-index.xml {
    root /var/www/astro;
    try_files /sitemap-index.xml =404;
}

location = /sitemap-0.xml {
    root /var/www/astro;
    try_files /sitemap-0.xml =404;
}
