# Astro static website — marketing pages
# These location blocks serve pre-rendered HTML from the Astro build output
# mounted at /var/www/astro. They are included before the SPA catch-all
# (frontend*.conf). Exact-match locations (= /path) always beat the
# prefix-match "location /" in the frontend config, so routing is safe.

location = / {
    root /var/www/astro;
    try_files /index.html =404;
}

location = /about {
    root /var/www/astro;
    try_files /about/index.html =404;
}

location = /product {
    root /var/www/astro;
    try_files /product/index.html =404;
}

location = /testimonials {
    root /var/www/astro;
    try_files /testimonials/index.html =404;
}

location /success-stories/ {
    root /var/www/astro;
    try_files $uri $uri/index.html =404;
}

# Astro hashed assets — long-term immutable cache
location /_astro/ {
    root /var/www/astro;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Static assets: serve from Astro build output if the file exists there (e.g. logos,
# silent-check-sso.html), otherwise fall through to the frontend SPA container
# (e.g. /static/icons/ which is only used inside the Vue app).
location /static/ {
    root /var/www/astro;
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri @frontend;
}

location @frontend {
    proxy_pass http://frontend;
    include utils/cachingProxy.conf;
}

# Sitemap files generated by Astro
location = /sitemap-index.xml {
    root /var/www/astro;
    try_files /sitemap-index.xml =404;
}

location = /sitemap-0.xml {
    root /var/www/astro;
    try_files /sitemap-0.xml =404;
}
