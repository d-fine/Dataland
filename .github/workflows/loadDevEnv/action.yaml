name: "Load Development Environment"
description: "Load environments/.env.dev and expose its variables to subsequent workflow steps"

runs:
  using: "composite"
  steps:
    - name: Load environments/.env.dev
      shell: bash
      run: |
        set -euo pipefail

        env_file="./environments/.env.dev"
        set -o allexport
        source "$env_file"
        set +o allexport

        while IFS= read -r env_key; do
          env_value="${!env_key}"
          if [[ "$env_value" == *$'\n'* ]]; then
            delimiter="EOF_${env_key}_$(date +%s%N)_$RANDOM"
            {
              echo "$env_key<<$delimiter"
              echo "$env_value"
              echo "$delimiter"
            } >> "$GITHUB_ENV"
          else
            echo "$env_key=$env_value" >> "$GITHUB_ENV"
          fi
        done < <(sed -nE 's/^([A-Za-z_][A-Za-z0-9_]*)=.*/\1/p' "$env_file")
