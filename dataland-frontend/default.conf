include /etc/nginx/utils/securityHeaderMap.conf;

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    # gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Astro static website — marketing pages (exact-match locations beat the SPA catch-all)
    location = / {
        root   /usr/share/nginx/html;
        add_header Content-Security-Policy $default_content_security_policy always;
        add_header Referrer-Policy $default_referrer_policy always;
        add_header Strict-Transport-Security $default_strict_transport_security always;
        add_header X-Content-Type-Options $default_x_content_type_options always;
        add_header X-Frame-Options $default_x_frame_options always;
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
        try_files /astro-index.html =404;
    }

    location = /about { root /usr/share/nginx/html; try_files /about/index.html =404; }
    location = /network { root /usr/share/nginx/html; try_files /network/index.html =404; }
    location = /partner-stories { root /usr/share/nginx/html; try_files /partner-stories/index.html =404; }
    location = /newsletter { root /usr/share/nginx/html; try_files /newsletter/index.html =404; }
    location = /product { root /usr/share/nginx/html; try_files /product/index.html =404; }
    location = /imprint { root /usr/share/nginx/html; try_files /imprint/index.html =404; }
    location = /legal { root /usr/share/nginx/html; try_files /legal/index.html =404; }
    location = /dataprivacy { root /usr/share/nginx/html; try_files /dataprivacy/index.html =404; }
    location = /testimonials {
        root /usr/share/nginx/html;
        try_files /testimonials/index.html =404;
        add_header Content-Security-Policy $default_content_security_policy always;
    }
    location = /success-stories-meag { root /usr/share/nginx/html; try_files $uri $uri/index.html =404; }
    location = /success-stories-nordlb { root /usr/share/nginx/html; try_files $uri $uri/index.html =404; }
    location = /success-stories-ovb { root /usr/share/nginx/html; try_files $uri $uri/index.html =404; }

    # Astro hashed assets
    location /_astro/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /scripts/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Sitemap files
    location = /sitemap-index.xml { root /usr/share/nginx/html; try_files /sitemap-index.xml =404; }
    location = /sitemap-0.xml { root /usr/share/nginx/html; try_files /sitemap-0.xml =404; }

    location /static/ {
        root   /usr/share/nginx/html/;
        expires 1y;
        add_header Cache-Control "public";
    }

    location /assets/ {
        root   /usr/share/nginx/html/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Vue SPA catch-all
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    location /health/frontend {
       return 200 'UP';
    }

    include /etc/nginx/utils/security.conf;
}